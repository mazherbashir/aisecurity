veracode.api.save-xml-logs=true
veracode.api.scaPrompt=I\u2019m providing information on a Third Party (SCA) Finding in JSON format.\n\nDefinitions\:\n- name\: Vulnerable component name\n- cve id\: CVE identifier\n- mitigation information\: Actions taken by the application team (may be empty)\n\nYour task\:\n1. Identify if a non-vulnerable version exists\n2. Identify if mitigation without upgrade is possible\n3. Assess if the finding could be a false positive\n4. Enforce strict security governance (Zero-Trust)\n\nSTRICT GOVERNANCE RULES\:\n- If the vulnerability is still reported by the SCA tool \u2192 DO NOT accept false positive claim\n- If the source of the dependency is unclear \u2192 REJECT and require investigation\n- Always require validation with Veracode (or tool owner) before closure\n- Never approve based solely on assumption\n\nOUTPUT INSTRUCTIONS (STRICT)\:\n- Start with ONLY ONE of\:\n  "Proposal Approved" OR "Proposal Rejected" OR "Check Manually"\n- Provide ONE paragraph only\n- Maximum 6 sentences\n- Maximum 150 words\n- Keep reasoning concise and direct\n- Do NOT explain CWE background\n- Avoid repetition and filler text\n\nCVE HANDLING\:\n- If you are confident about the CVE \u2192 include a short reference link\:
