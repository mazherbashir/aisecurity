server.error.include-message=always
server.port=8081
spring.application.name=crs-review-api
spring.jackson.serialization.indent-output=true

# --- Veracode Connection Settings ---
veracode.api.url=https\://api.veracode.com
veracode.api.debug=true

# --- Module & Architecture Filtering ---
veracode.api.ignore-modules=Microsoft,Azure,System,AspNetCore,Newtonsoft,EntityFramework,NLog,Log4Net,AutoMapper,AppInsights,UnitTesting,BouncyCastle,Serilog,Dapper,OpenXml,Serialization,OpenXmlPowerTools,GemBox,SharpDocx,Quartz,sni.dll,VeracodeJavaAPI.jar,.test.dll,.Tests.dll,.map,_nodemodule_,fsmonitor-watchman.sample
veracode.api.include-modules=veracodegen.htmla.pya,pwc.,.zip,.war,snapshot.jar,0.jar,pwc,release.jar,app_,.bca,.gz,-service.jar,-advancer.jar
veracode.api.ignore-ecosystems=so
veracode.api.no-sca=Apex,TSQL
veracode.api.architecture-mappings.Go=go,golang,GO,GOLANG
veracode.api.architecture-mappings.Java=maven,gradle,JAVA,JVM
veracode.api.architecture-mappings.JavaScript=npm,bower,JAVASCRIPT
veracode.api.architecture-mappings.NET=nuget,CIL32,MSIL
veracode.api.architecture-mappings.PHP=composer,PHP
veracode.api.architecture-mappings.Python=pip,pypi,PYTHON
veracode.api.architecture-mappings.Ruby=rubygems,RUBY

# --- Policy & Remediation Deadlines ---
veracode.api.scan-validity-days=90
veracode.api.tier-mappings.External.Confidential=tier-1
veracode.api.tier-mappings.External.HighlyConfidential=tier-1
veracode.api.tier-mappings.External.Internal=tier-2
veracode.api.tier-mappings.External.Public=tier-2
veracode.api.tier-mappings.Internal.Confidential=tier-3b
veracode.api.tier-mappings.Internal.HighlyConfidential=tier-3a
veracode.api.tier-mappings.Internal.Internal=tier-3b
veracode.api.tier-mappings.Internal.Public=tier-3b

# Grace Periods (Days)
veracode.api.grace-periods.tier-1.VeryHigh=10
veracode.api.grace-periods.tier-1.High=10
veracode.api.grace-periods.tier-1.Medium=30
veracode.api.grace-periods.tier-1.Low=180
veracode.api.grace-periods.tier-2.VeryHigh=10
veracode.api.grace-periods.tier-2.High=10
veracode.api.grace-periods.tier-2.Medium=30
veracode.api.grace-periods.tier-2.Low=180
veracode.api.grace-periods.tier-3a.VeryHigh=30
veracode.api.grace-periods.tier-3a.High=30
veracode.api.grace-periods.tier-3a.Medium=60
veracode.api.grace-periods.tier-3a.Low=180
veracode.api.grace-periods.tier-3b.VeryHigh=60
veracode.api.grace-periods.tier-3b.High=60
veracode.api.grace-periods.tier-3b.Medium=90
veracode.api.grace-periods.tier-3b.Low=180
veracode.api.grace-periods.tier-4.VeryHigh=60
veracode.api.grace-periods.tier-4.High=60
veracode.api.grace-periods.tier-4.Medium=90
veracode.api.grace-periods.tier-4.Low=180

# --- Logging & Persistence Settings ---
# true (default): Save the final processed JSON report to the 'history' folder.
veracode.api.save-json-history=true
veracode.api.history-limit=10

# true: Save raw XML data from Veracode APIs (build lists, detailed reports) to the 'logs' folder.
#       Setting this to 'false' removes most of the background "noise".
veracode.api.save-xml-logs=true

# true: Save raw JSON responses from GitHub GraphQL for every package to the 'logs' folder.
#       Since this generates many files, it is 'false' by default.
veracode.api.save-sca-log=false

# --- AI & Remediation Intelligence ---
veracode.api.ai-engines=Gemini
veracode.api.engine-models=azure.gpt-4o
veracode.api.shared-service-endpoint=https\://genai-sharedservice-americas.pwcinternal.com/v1/chat/completions
veracode.api.shared-service-max-tokens=1000
veracode.api.shared-service-role=user
# The Veracode API type used to submit mitigation proposals ('REST' or 'XML').
veracode.api.mitigation-api-type=REST

# Toggle or mode for automatically submitting AI-approved mitigation proposals back to Veracode.
# Allowed values:
#   - true  : Post proposals automatically to Veracode.
#   - false : Disable posting (evaluate proposals locally only).
#   - debug : Run in simulation mode (logs proposal payloads without submitting to the API).
veracode.api.mitigation-proposal-enabled=true

# --- Secondary Audit Layer (Dual-Model Review) ---
# Master toggle: set to 'true' to enable a second AI model to audit and verify Phase 1 output.
# When 'false' (default), Phase 2 is completely bypassed and Phase 1 output is returned directly.
veracode.api.secondary-audit-enabled=false

# The AI model used for the secondary audit pass (e.g. gpt-4o-mini, claude-3-5-sonnet).
veracode.api.auditor-model-name=gpt-4o-mini

# Auditor endpoint configuration — mirrors the primary shared-service keys.
veracode.api.shared-auditor-endpoint=https\://genai-sharedservice-americas.pwcinternal.com/v1/chat/completions
veracode.api.shared-auditor-max-tokens=1000
veracode.api.shared-auditor-role=user

# Message returned to the UI when the Evaluator and Auditor models disagree.
# The full Phase 1 output is discarded and this text is sent back to the application instead.
veracode.api.auditor-disagree-fallback-text=Proposal Rejected please perform a Manual Review as The Evaluator and Auditor model has contradiction!

# Auditor system prompt — instructs the second model to review Phase 1 output for accuracy
# and formatting compliance, then emit a structured "Second Look Assessment" block.
veracode.api.auditorPrompt=You are a Senior Security QA Auditor acting as a secondary verification layer. Your job is to strictly review the output generated by a primary evaluation model against the original input data.\n\nYou will be provided with two sets of data\:\n1. [Original Request Data]\: The raw vulnerability JSON payload.\n2. [Phase 1 Output]\: The text response generated by the primary model.\n\nYour task is to independently verify the quality, accuracy, and constraint compliance of the Phase 1 Output.\n\n### CRITERIA FOR EVALUATION\n1. Accuracy Check\: Did Phase 1 correctly interpret the vulnerability description and user comments? (e.g., If the user comments proved the value is a non-secret UI lookup GUID, did Phase 1 correctly identify it as a false positive?)\n2. Constraint Compliance Check\: Did Phase 1 strictly adhere to its formatting boundaries?\n   - Does it start exactly with "Proposal Approved" or "Proposal Rejected"?\n   - Is it written as exactly ONE paragraph?\n   - Is it under 120 words and free of bullet points or headings?\n\n### OUTPUT FORMAT\nYou must output your audit evaluation strictly using the following Markdown template. Do not add conversational intro text or metadata.\n\n### Second Look Assessment\n- **Validation Verdict\:** [Agree / Disagree with Phase 1 Verdict]\n- **Rule Compliance\:** [Pass / Fail - state if formatting limits were met]\n- **Critique\:** [2-3 sentences explaining your reasoning regarding the technical accuracy and compliance of Phase 1]

veracode.api.sastPrompt=I\u2019m providing information on a First Party Finding for an application in JSON format.\n\nDefinitions\:\n- cwe id\: The CWE ID of the finding\n- mitigation information\: Actions taken by the application team (may be empty)\n\nYour task\:\n1. Determine if this is a real security issue.\n2. Determine if the mitigation sufficiently reduces the risk.\n3. If not mitigated, clearly state why.\n\nInstructions (STRICT)\:\n- Start with\: "Proposal Approved" or "Proposal Rejected"\n- Provide ONLY ONE short paragraph\n- Maximum 4\u20135 sentences\n- Maximum 120 words\n- No repetition, no extra explanation\n- Keep reasoning concise and direct\n- Follow Zero-Trust principles in evaluation but don't repeat it in para.\n\nDo not provide bullet points, headings, or long explanations.

veracode.api.scaPrompt=I\u2019m providing information on a Third Party (SCA) Finding in JSON format.\n\nDefinitions\:\n- name\: Vulnerable component name\n- cve id\: CVE identifier\n- mitigation information\: Actions taken by the application team (may be empty)\n\nYour task\:\n1. Identify if a non-vulnerable version exists\n2. Identify if mitigation without upgrade is possible\n3. Assess if the finding could be a false positive\n4. Enforce strict security governance (Zero-Trust)\n\nSTRICT GOVERNANCE RULES\:\n- If the vulnerability is still reported by the SCA tool \u2192 DO NOT accept false positive claim\n- If the source of the dependency is unclear \u2192 REJECT and require investigation\n- Always require validation with Veracode (or tool owner) before closure\n- Never approve based solely on assumption\n\nOUTPUT INSTRUCTIONS (STRICT)\:\n- Start with ONLY ONE of\:\n  "Proposal Approved" OR "Proposal Rejected" OR "Check Manually"\n- Provide ONE paragraph only\n- Maximum 6 sentences\n- Maximum 150 words\n- Keep reasoning concise and direct\n- Do NOT explain CWE background\n- Avoid repetition and filler text\n\nCVE HANDLING\:\n- If you are confident about the CVE \u2192 include a short reference link\:

# --- SCA Remediation Settings ---
# true (default): Fetch fixed version data from GitHub GraphQL. 
#       This enables the "Safe Version" column in the report but adds API call overhead.
# false: Disable external lookups. 
#       Use this if you want faster report generation or want to hide the "Safe Version" column in the UI.
veracode.api.scaSafeVersionEnabled=true

# Custom messages for the "Safe Version" column when a fix isn't found or is for an older version.
veracode.api.sca-no-fix-message=No safe version published in GHSA. Check manually.
veracode.api.sca-stale-fix-message=No safe version found. Fix applies to a different major version. Check manually.
