server.error.include-message=always
server.port=8081
spring.application.name=crs-review-api
#"Pretty Printing" for all JSON API responses.
spring.jackson.serialization.indent-output=true
# AI Engines available for vulnerability analysis
veracode.api.ai-engines=Gemini,Azure OpenAI,OpenAI,Anthropic
veracode.api.architecture-mappings.Go=go,golang,GO,GOLANG
veracode.api.architecture-mappings.Java=maven,gradle,JAVA,JVM
veracode.api.architecture-mappings.JavaScript=npm,bower,JAVASCRIPT
veracode.api.architecture-mappings.NET=nuget,CIL32,MSIL
veracode.api.architecture-mappings.PHP=composer,PHP
veracode.api.architecture-mappings.Python=pip,pypi,PYTHON
veracode.api.architecture-mappings.Ruby=rubygems,RUBY
# General application debug flag
veracode.api.debug=true
# Controls mitigation proposal behavior: 
# true  - Send request to Veracode API
# false - Block request and throw error
# debug - Bypass Veracode API and return success message (200 OK)
veracode.api.mitigation-proposal-enabled=debug
veracode.api.grace-periods.tier-1.High=10
veracode.api.grace-periods.tier-1.Low=180
veracode.api.grace-periods.tier-1.Medium=30
veracode.api.grace-periods.tier-1.VeryHigh=10
veracode.api.grace-periods.tier-2.High=10
veracode.api.grace-periods.tier-2.Low=180
veracode.api.grace-periods.tier-2.Medium=30
veracode.api.grace-periods.tier-2.VeryHigh=10
veracode.api.grace-periods.tier-3a.High=30
veracode.api.grace-periods.tier-3a.Low=180
veracode.api.grace-periods.tier-3a.Medium=60
veracode.api.grace-periods.tier-3a.VeryHigh=30
veracode.api.grace-periods.tier-3b.High=60
veracode.api.grace-periods.tier-3b.Low=180
veracode.api.grace-periods.tier-3b.Medium=90
veracode.api.grace-periods.tier-3b.VeryHigh=60
veracode.api.grace-periods.tier-4.High=60
veracode.api.grace-periods.tier-4.Low=180
veracode.api.grace-periods.tier-4.Medium=90
veracode.api.grace-periods.tier-4.VeryHigh=60
# Maximum number of historical reports to show in the UI list
veracode.api.history-limit=10
# SCA ecosystems and modules to exclude from the report output
veracode.api.ignore-ecosystems=so
# Modules to explicitly include in the gap analysis report
veracode.api.ignore-modules=Microsoft,Azure,System,AspNetCore,Newtonsoft,EntityFramework,NLog,Log4Net,AutoMapper,AppInsights,UnitTesting,BouncyCastle,Serilog,Dapper,OpenXml,Serialization,OpenXmlPowerTools,GemBox,SharpDocx,Quartz,sni.dll,VeracodeJavaAPI.jar,.test.dll,.Tests.dll,.map,_nodemodule_,fsmonitor-watchman.sample
veracode.api.include-modules=veracodegen.htmla.pya,pwc.,.zip,.war,snapshot.jar,0.jar,pwc,release.jar,app_,.bca,.gz,-service.jar,-advancer.jar
veracode.api.mitigation-proposal-enabled=debug
veracode.api.no-sca=Apex,TSQL
veracode.api.sastPrompt=I\u2019m providing information on a First Party Finding for an application in JSON format. Below is a list of what each key in the JSON data stands for\:\n - cwe id\: The CWE ID of the finding.\n  - mitigation information\: Information provided by the application team on actions taken to mitigate the risk. Can be an empty string.\n\nUsing the information provided alongside the mitigation information provided by the application team determine\:\n - Whether the finding is indeed a security issue.\n - Whether the information provided by the team mitigates the risk.\n - If the risk is not mitigated based on the information provided by the team, then\:\n In your reply consider that the organization is under a Zero-Trust Policy. Provide us the final answer as a short para with basic reasoning,max 500 words.\nStart with Proposal Approved or Proposal Rejected,
veracode.api.save-json-history=true
veracode.api.save-xml-logs=true
veracode.api.scaPrompt=\nI\u2019m providing information on a Third Party Finding for an application in JSON format. Below is a list of what each key in the JSON data stands for\:\n - name\: The name of the vulnerable component.\n - cve id\: The CVE ID of the finding.\n - migitation information\: Information provided by the application team on actions taken to mitigate the risk. Can be an empty string.\n\nUsing the information provided by the application team determine\:\n - Whether there are any non-vulnerable version(s) of the component.\n - Whether there are any known fixes for the vulnerability that would not require changing the version of the component.\n - Whether there is any possibility that this finding may not be a security issue.  \nIn your reply consider that the organization is under a Zero-Trust Policy. Provide us the final answer as a short para with basic reasoning,max 500 words.\nStart with Proposal Approved or Proposal Rejected,
# Number of days before a scan is considered stale in the UI
veracode.api.scan-validity-days=90
veracode.api.tier-mappings.External.Confidential=tier-1
veracode.api.tier-mappings.External.HighlyConfidential=tier-1
veracode.api.tier-mappings.External.Internal=tier-2
veracode.api.tier-mappings.External.Public=tier-2
veracode.api.tier-mappings.Internal.Confidential=tier-3b
veracode.api.tier-mappings.Internal.HighlyConfidential=tier-3a
veracode.api.tier-mappings.Internal.Internal=tier-3b
veracode.api.tier-mappings.Internal.Public=tier-3b
veracode.api.url=https\://api.veracode.com
